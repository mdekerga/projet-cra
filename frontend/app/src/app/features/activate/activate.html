<div class="activate-container">
  <mat-card class="activate-card mat-elevation-z4">
    <mat-card-header>
      <div class="header-content">
        <mat-icon color="primary" class="large-icon">verified_user</mat-icon>
        <mat-card-title>Activation de compte</mat-card-title>
        <mat-card-subtitle>Définissez votre mot de passe sécurisé</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="activateForm" (ngSubmit)="onSubmit()" class="activate-form">
        <mat-form-field appearance="outline">
          <mat-label>Votre adresse Email</mat-label>
          <input matInput formControlName="email" />
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Nouveau mot de passe</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-hint>Minimum 6 caractères</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmer le mot de passe</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="confirmPassword"
          />
          <mat-error *ngIf="activateForm.hasError('mismatch')">
            Les mots de passe ne correspondent pas.
          </mat-error>
        </mat-form-field>

        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="activateForm.invalid || isLoading"
          >
            {{ isLoading ? 'Activation en cours...' : 'Activer mon accès' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
