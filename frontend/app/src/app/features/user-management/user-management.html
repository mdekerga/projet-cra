<div class="user-management-container container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="title-with-icon d-flex align-items-center">
      <mat-icon color="primary" class="me-2">people</mat-icon>
      <h1 class="h3 m-0">Gestion des Collaborateurs</h1>
    </div>

    <button mat-raised-button color="primary" (click)="openAddUserDialog()">
      <mat-icon>person_add</mat-icon>
      Nouveau Collaborateur
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger shadow-sm">
    {{ errorMessage }}
  </div>

  <div *ngIf="!errorMessage" class="table-container mat-elevation-z3">
    <table mat-table [dataSource]="dataSource" class="full-width-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Collaborateur</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-name">
            <strong>{{ user.firstName }} {{ user.lastName | uppercase }}</strong>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rôle</th>
        <td mat-cell *matCellDef="let user">
          <span class="role-badge" [ngClass]="user.role">
            {{ user.role }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Compte</th>
        <td mat-cell *matCellDef="let user">
          <span class="status-badge" [ngClass]="user.active ? 'active' : 'inactive'">
            {{ user.active ? 'Actif' : 'Désactivé' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user">
          <div class="action-buttons">
            <button
              mat-icon-button
              color="primary"
              matTooltip="Modifier"
              (click)="openEditUserDialog(user)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              [color]="user.active ? 'warn' : 'accent'"
              [matTooltip]="user.active ? 'Désactiver' : 'Activer'"
              (click)="toggleStatus(user)"
            >
              <mat-icon>{{ user.active ? 'lock' : 'lock_open' }}</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
