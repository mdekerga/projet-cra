<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary"><i class="bi bi-people-fill"></i> Gestion des Collaborateurs</h2>
    <button class="btn btn-success" routerLink="/admin/users/new">
      <i class="bi bi-plus-circle"></i> Nouveau Collaborateur
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div class="card shadow-sm" *ngIf="!loading">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Collaborateur</th>
            <th>Email</th>
            <th>Rôle</th>
            <th>Statut</th>
            <th>Compte</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>
              <div class="fw-bold">{{ user.lastName | uppercase }} {{ user.firstName }}</div>
            </td>
            <td>{{ user.email }}</td>
            <td>
              <span class="badge rounded-pill bg-light text-dark border">
                {{ user.role }}
              </span>
            </td>
            <td>
              <span
                class="badge"
                [ngClass]="user.statut === 'MISSION' ? 'bg-info' : 'bg-warning text-dark'"
              >
                {{ user.statut }}
              </span>
            </td>
            <td>
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  [checked]="user.active"
                  (change)="toggleUserStatus(user)"
                />
                <label class="form-check-label small">
                  {{ user.active ? 'Actif' : 'Désactivé' }}
                </label>
              </div>
            </td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary me-2" (click)="editUser(user.id!)">
                <i class="bi bi-pencil"></i> Modifier
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
