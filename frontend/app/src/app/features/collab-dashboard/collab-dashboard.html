<div class="container mt-4">
  <h2>Mon Compte Rendu d'Activité (CRA)</h2>

  <div class="card p-3 mb-4">
    <div class="d-flex gap-3 align-items-center">
      <select [(ngModel)]="selectedMonth" class="form-select w-auto">
        <option [value]="3">Mars</option>
        <option [value]="4">Avril</option>
      </select>
      <button (click)="onGenerateClick()" class="btn btn-primary">
        🚀 Générer mon mois (1-clic)
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <table class="table table-bordered" *ngIf="currentCRA">
    <thead class="table-light">
      <tr>
        <th>Date</th>
        <th>Activité</th>
        <th>Mission / Projet</th>
        <th>Durée</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let day of currentCRA.days">
        <td>{{ day.date | date: 'EEEE dd/MM' }}</td>
        <td>{{ day.activityType }}</td>
        <td>
          <span *ngIf="day.mission">{{ day.mission.name }}</span>
          <span *ngIf="!day.mission" class="badge bg-warning text-dark">Intercontrat</span>
        </td>
        <td>{{ day.duration }}j</td>
      </tr>
    </tbody>
  </table>

  <div class="mt-3" *ngIf="currentCRA">
    <button
      (click)="onSubmitCRA()"
      class="btn btn-success"
      [disabled]="currentCRA.status !== 'DRAFT'"
    >
      Envoyer pour validation
    </button>
    <p class="text-muted mt-2">
      Statut actuel : <strong>{{ currentCRA.status }}</strong>
    </p>
  </div>
</div>
