<h2 mat-dialog-title>{{ isEditMode ? 'Modifier la mission' : 'Créer une mission' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="d-flex flex-column gap-3 mt-2">
    <mat-form-field appearance="outline">
      <mat-label>Nom du Client</mat-label>
      <input matInput formControlName="client" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Titre de la mission</mat-label>
      <input matInput formControlName="titre" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>

    <div class="d-flex gap-2">
      <mat-form-field appearance="outline" class="flex-grow-1">
        <mat-label>Date de début</mat-label>
        <input
          matInput
          [matDatepicker]="pickerStart"
          formControlName="dateDebut"
          placeholder="JJ/MM/AAAA"
        />
        <mat-datepicker-toggle matIconSuffix [for]="pickerStart"></mat-datepicker-toggle>
        <mat-datepicker #pickerStart></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-grow-1">
        <mat-label>Date de fin</mat-label>
        <input
          matInput
          [matDatepicker]="pickerEnd"
          formControlName="dateFin"
          placeholder="JJ/MM/AAAA"
        />
        <mat-datepicker-toggle matIconSuffix [for]="pickerEnd"></mat-datepicker-toggle>
        <mat-datepicker #pickerEnd></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Assigner à...</mat-label>
      <mat-select formControlName="id">
        <mat-option *ngFor="let user of users" [value]="user.id">
          {{ user.firstName }} {{ user.lastName }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <mat-dialog-actions align="end">
    <button mat-button (click)="ref.close()">Annuler</button>
    <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="save()">
      {{ isEditMode ? 'Mettre à jour' : 'Créer' }}
    </button>
  </mat-dialog-actions>
</mat-dialog-actions>
