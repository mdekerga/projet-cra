<div class="page-container">
  <div class="header-section">
    <h1><mat-icon>business_center</mat-icon> Missions Clients</h1>
    <button mat-raised-button color="accent" (click)="openMissionDialog()">
      <mat-icon>assignment</mat-icon> Créer une Mission
    </button>
  </div>
  

  <div class="table-wrapper mat-elevation-z3">
    <table mat-table [dataSource]="missions">
      <ng-container matColumnDef="client">
        <th mat-header-cell *matHeaderCellDef>Client</th>
        <td mat-cell *matCellDef="let m">
          <strong>{{ m.client }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="titre">
        <th mat-header-cell *matHeaderCellDef>Titre</th>
        <td mat-cell *matCellDef="let m">
          <strong>{{ m.titre }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="period">
        <th mat-header-cell *matHeaderCellDef>Période</th>
        <td mat-cell *matCellDef="let m">
          {{ m.dateDebut | date: 'dd/MM/yyyy' }} - {{ m.dateFin | date: 'dd/MM/yyyy' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="collaborator">
        <th mat-header-cell *matHeaderCellDef>Assigné à</th>
        <td mat-cell *matCellDef="let m">{{ m.assignedUserName || 'Non assigné' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let m">
          <button mat-icon-button color="primary" (click)="editMission(m)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteMission(m.id)">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
