<div class="container mt-4">
  <h1 class="h4 mb-4">Historique de mes missions</h1>

  <div class="history-list">
    <mat-card class="history-item mb-3 mat-elevation-z1" *ngFor="let cra of history">
      <div class="card-content d-flex justify-content-between align-items-center p-3">
        <div class="info">
          <div class="month">
            <strong>{{ cra.month }}</strong>
          </div>
          <div class="mission text-muted small">{{ cra.missionName }}</div>
        </div>

        <div class="days">
          <span class="badge bg-light text-dark">{{ cra.days }} jours</span>
        </div>

        <div class="status">
          <span class="status-pill" [ngClass]="cra.status.toLowerCase()">
            {{ cra.status }}
          </span>
        </div>

        <button mat-icon-button><mat-icon>visibility</mat-icon></button>
      </div>
    </mat-card>
  </div>
</div>
